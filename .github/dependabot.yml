version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    labels:
      - type:chore
      - area:deps
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    labels:
      - type:chore
      - area:ci
    commit-message:
      prefix: ci
      include: scope
    ignore:
      # v6 instala pnpm 11 que rechaza lockfileVersion 9.0 (ERR_PNPM_BROKEN_LOCKFILE).
      # Revisar cuando el lockfile migre a formato 10+ o cuando v6 acepte version input.
      - dependency-name: pnpm/action-setup
        update-types: [version-update:semver-major]
