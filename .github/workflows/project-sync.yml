name: Project board sync

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened, ready_for_review]

concurrency:
  group: project-sync-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  add-to-project:
    name: Añadir al Project "Arqyx roadmap"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Verificar configuración del secret
        id: check_secret
        env:
          PROJECTS_PAT: ${{ secrets.PROJECTS_PAT }}
        run: |
          if [ -z "$PROJECTS_PAT" ]; then
            echo "::warning::El secret PROJECTS_PAT no está configurado. Saltando la sincronización del Project board."
            echo "::warning::Ver docs/project-board.md sección 'Setup inicial' para instrucciones."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Añadir issue al project
        if: steps.check_secret.outputs.configured == 'true' && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_PAT }}
          ITEM_URL: ${{ github.event.issue.html_url }}
        run: |
          echo "Añadiendo $ITEM_URL al project Arqyx roadmap"
          gh project item-add 1 --owner Oscarsp15 --url "$ITEM_URL" || {
            echo "::warning::No se pudo añadir el issue al project. Puede que ya esté añadido."
          }

      - name: Añadir PR al project
        if: steps.check_secret.outputs.configured == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_PAT }}
          ITEM_URL: ${{ github.event.pull_request.html_url }}
        run: |
          echo "Añadiendo $ITEM_URL al project Arqyx roadmap"
          gh project item-add 1 --owner Oscarsp15 --url "$ITEM_URL" || {
            echo "::warning::No se pudo añadir el PR al project. Puede que ya esté añadido."
          }
